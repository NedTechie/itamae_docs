title: Itamae Documentation
description: Comprehensive documentation for Itamae - a lightweight, Chef-inspired configuration management tool for Ruby
baseurl: ""
url: "https://nedtechie.github.io"
remote_theme: pages-themes/cayman@v0.2.0

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

permalink: pretty

defaults:
  - scope:
      path: ""
    values:
      layout: default

collections:
  resources:
    output: true
    permalink: /resources/:name/

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
